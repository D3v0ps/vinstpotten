// ─────────────────────────────────────────────────────────────
// CountUp — animates numerically toward `value`
// ─────────────────────────────────────────────────────────────
function CountUp({ value, duration = 400, format = (n) => n.toLocaleString('sv-SE') }) {
  const [shown, setShown] = React.useState(value);
  React.useEffect(() => {
    const from = shown;
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = Math.round(from + (value - from) * eased);
      setShown(v);
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{format(shown)}</>;
}

// ─────────────────────────────────────────────────────────────
// Calculator math
// ─────────────────────────────────────────────────────────────
const PRICE_PER_SHIRT = 249;
const COST_PER_SHIRT = 95;
const PROFIT_PER_SHIRT = PRICE_PER_SHIRT - COST_PER_SHIRT;

function calcResults(sellers, shirtsPer) {
  const totalShirts = sellers * shirtsPer;
  const revenue = totalShirts * PRICE_PER_SHIRT;
  const profit = totalShirts * PROFIT_PER_SHIRT;
  return { totalShirts, revenue, profit };
}

// ─────────────────────────────────────────────────────────────
// Themable slider
// ─────────────────────────────────────────────────────────────
function ThemedSlider({ label, val, setVal, min, max, suffix, accent = '#000', track = '#e5e0d6', thumbBorder = '#000', thumbFill = '#fff', tickColor = 'rgba(0,0,0,0.18)', valueFont = 'inherit', valueSize = 56, ticks }) {
  const trackRef = React.useRef(null);
  const dragging = React.useRef(false);
  const set = (clientX) => {
    const r = trackRef.current?.getBoundingClientRect();
    if (!r) return;
    const t = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    setVal(Math.round(min + t * (max - min)));
  };
  const pct = ((val - min) / (max - min)) * 100;
  return (
    <div style={{ width: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14, gap: 16, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 13, letterSpacing: '0.06em', textTransform: 'uppercase', opacity: 0.65 }}>{label}</span>
        <span style={{ fontFamily: valueFont, fontSize: valueSize, lineHeight: 1, fontWeight: 400, fontVariantNumeric: 'tabular-nums' }}>
          <CountUp value={val} duration={180} />
          {suffix && <span style={{ fontSize: valueSize * 0.4, marginLeft: 6, opacity: 0.55 }}>{suffix}</span>}
        </span>
      </div>
      <div
        ref={trackRef}
        onPointerDown={(e) => { dragging.current = true; e.currentTarget.setPointerCapture(e.pointerId); set(e.clientX); }}
        onPointerMove={(e) => { if (dragging.current) set(e.clientX); }}
        onPointerUp={(e) => { dragging.current = false; e.currentTarget.releasePointerCapture?.(e.pointerId); }}
        style={{ position: 'relative', height: 44, cursor: 'pointer', touchAction: 'none', userSelect: 'none' }}
      >
        <div style={{ position: 'absolute', top: 21, left: 0, right: 0, height: 2, background: track, borderRadius: 2 }} />
        <div style={{ position: 'absolute', top: 21, left: 0, width: `${pct}%`, height: 2, background: accent, borderRadius: 2 }} />
        {ticks && (
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {Array.from({ length: ticks }).map((_, i) => {
              const tpct = (i / (ticks - 1)) * 100;
              return <div key={i} style={{ position: 'absolute', left: `${tpct}%`, top: 18, width: 1, height: 8, background: tickColor }} />;
            })}
          </div>
        )}
        <div style={{
          position: 'absolute', top: 6, left: `calc(${pct}% - 16px)`,
          width: 32, height: 32, borderRadius: '50%',
          background: thumbFill, border: `2px solid ${thumbBorder}`,
          boxShadow: '0 2px 6px rgba(0,0,0,0.12)', transition: 'transform .12s',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App — stacked directions, responsive
// ─────────────────────────────────────────────────────────────
function useIsMobile(breakpoint = 768) {
  const [mobile, setMobile] = React.useState(() =>
    typeof window !== 'undefined' ? window.innerWidth < breakpoint : false
  );
  React.useEffect(() => {
    const handler = () => setMobile(window.innerWidth < breakpoint);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, [breakpoint]);
  return mobile;
}

function App() {
  const mobile = useIsMobile();
  return (
    <>
      <DirectionNav mobile={mobile} />
      <DirectionMarker id="saker" num="01" name="Säker" blurb="Editorial Scandinavian — plommon på off-white, calculator-as-hero, ordnad layout." mobile={mobile} />
      <SakerHomepage mobile={mobile} />
      <DirectionMarker id="djarv" num="02" name="Djärv" blurb="Magazine poster — oversized typografi, asymmetri, acid-lime som rotation-färg." mobile={mobile} />

      <OvantadHomepage mobile={mobile} />
    </>
  );
}
